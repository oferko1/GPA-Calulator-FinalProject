<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>GPA Calculator</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">

    <header>
      <h1>GPA Calculator</h1>
      <div id="gpa">0</div>
    </header>

    <form>
      <div class="form-row">
        <div class="field wide">
          <label for="course-name">Course</label>
          <input type="text" id="course-name" />
        </div>
        <div class="field">
          <label for="credits">Credits</label>
          <input type="text" id="credits" />
        </div>
        <div class="field">
          <label for="grade">Grade</label>
          <select id="grade">
            <option value="">--</option>
            <option value="4.0">A</option>
            <option value="3.7">A-</option>
            <option value="3.3">B+</option>
            <option value="3.0">B</option>
            <option value="2.7">B-</option>
            <option value="2.3">C+</option>
            <option value="2.0">C</option>
            <option value="1.7">C-</option>
            <option value="1.3">D+</option>
            <option value="1.0">D</option>
            <option value="0.0">F</option>
          </select>
        </div>
      </div>
      <div class="actions">
        <input type="reset" value="Clear" />
        <input type="button" value="Add Course" onclick="addCourse();" />
      </div>
    </form>

    <div id="list-section">
      <h2>Courses</h2>
      <div id="course-list"></div>
    </div>

    <footer>
      <div class="stat">
        <span class="stat-label">Total Credits</span>
        <span class="stat-value" id="total-credits">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Quality Points</span>
        <span class="stat-value" id="quality-points">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Standing</span>
        <span class="stat-value" id="standing">--</span>
      </div>
    </footer>

  </div>

  <script src="gpa.js"></script>
</body>
</html>
